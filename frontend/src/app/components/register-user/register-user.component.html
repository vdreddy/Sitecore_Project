<div class="register-page">
  <div class="section-header">
    <h2>Register User</h2>
    <button class="btn btn-secondary btn-sm" (click)="onCancel()">
      &larr; Back
    </button>
  </div>

  @if (error) {
    <div class="alert alert-error">{{ error }}</div>
  }

  <div class="card">
    <h3 class="card-title">Registration Type</h3>
    <div class="form-group">
      <label for="customerType">Customer Type</label>
      <select id="customerType" [(ngModel)]="registration.customerType">
        <option value="INDIVIDUAL">Individual Customer</option>
        <option value="TRUST">Trust</option>
        <option value="CORPORATE">Corporate Customer</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h3 class="card-title">Required Information</h3>
    <div class="form-grid">
      <div class="form-group">
        <label for="ssn">SSN / ITIN *</label>
        <input type="text" id="ssn" [(ngModel)]="registration.ssn" placeholder="Enter SSN or ITIN" required>
      </div>
      <div class="form-group">
        <label for="yearOfBirth">Year of Birth *</label>
        <input type="number" id="yearOfBirth" [(ngModel)]="registration.yearOfBirth" placeholder="e.g., 1985" required>
      </div>
      <div class="form-group">
        <label for="phoneNumber">Phone Number *</label>
        <input type="tel" id="phoneNumber" [(ngModel)]="registration.phoneNumber" placeholder="Enter phone number" required>
      </div>
      <div class="form-group">
        <label for="regEmail">Email Address *</label>
        <input type="email" id="regEmail" [(ngModel)]="registration.email" placeholder="Enter email address" required>
      </div>
      <div class="form-group">
        <label for="regUsername">Username *</label>
        <input type="text" id="regUsername" [(ngModel)]="registration.username" placeholder="Choose a username" required>
      </div>
    </div>
  </div>

  @if (registration.customerType === 'CORPORATE' || registration.customerType === 'TRUST') {
    <div class="card">
      <h3 class="card-title">Organization Information</h3>
      <div class="form-group">
        <label for="companyName">Organization Name</label>
        <input type="text" id="companyName" [(ngModel)]="registration.companyName" placeholder="Enter organization name">
      </div>
      <div class="form-group">
        <label for="regTaxId">Tax ID</label>
        <input type="text" id="regTaxId" [(ngModel)]="registration.taxId" placeholder="Enter Tax ID">
      </div>
    </div>
  }

  <div class="card">
    <h3 class="card-title">Personal Details</h3>
    <div class="form-grid">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" [(ngModel)]="registration.firstName" placeholder="Enter first name">
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" [(ngModel)]="registration.lastName" placeholder="Enter last name">
      </div>
      <div class="form-group full-width">
        <label for="regAddress">Address</label>
        <input type="text" id="regAddress" [(ngModel)]="registration.address" placeholder="Enter address">
      </div>
      <div class="form-group">
        <label for="regCity">City</label>
        <input type="text" id="regCity" [(ngModel)]="registration.city" placeholder="Enter city">
      </div>
      <div class="form-group">
        <label for="regState">State</label>
        <input type="text" id="regState" [(ngModel)]="registration.state" placeholder="Enter state">
      </div>
      <div class="form-group">
        <label for="regZip">ZIP</label>
        <input type="text" id="regZip" [(ngModel)]="registration.zip" placeholder="Enter ZIP code">
      </div>
      <div class="form-group">
        <label for="regCountry">Country</label>
        <input type="text" id="regCountry" [(ngModel)]="registration.country" placeholder="Enter country">
      </div>
    </div>
  </div>

  <div class="form-actions">
    <button class="btn btn-primary" (click)="onSubmit()" [disabled]="!isFormValid() || loading">
      @if (loading) {
        <span class="spinner"></span>
      }
      Register User
    </button>
    <button class="btn btn-secondary" (click)="onCancel()" [disabled]="loading">
      Cancel
    </button>
  </div>
</div>
